<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission - Montserrat Barco</title>
    <meta name="description" content="The Commision Page to my Portfolio.">

    <link rel="icon" type="image/png" href="/assets/images/painterIconTitle.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/style.css">

    <script src="../javascript/responsive.js" defer></script>
</head> 

<body>
    <header class="site-header">
        <button id="nav-burger-menu" class="icon nav-burger-menu" aria-label="Open navigation">
            <i class="fa-solid fa-bars"></i>
        </button>

        <nav id="site-nav" class="site-nav">
            <ul>
                <li><a href="../../index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="commission.html" aria-current="page"><b>Commission</b></a></li>
                <li><a href="about.html">About Me</a></li>
            </ul>
        </nav>

        <a class="icon" href="https://www.instagram.com/macaroniandcheese_101_" aria-label="Visit my instagram profile."
            target="_blank" rel="noreferrer">
            <i class="fa-brands fa-instagram"></i>
        </a>
    </header>

    <main>
        <header class="main-header">
            <h1>Art Commissions</h1>
        </header>

        <section class="main-content">
            <form class="form" action="https://gibm.becknet.ch/formular/formular.php" method="POST" enctype="multipart/form-data"> <!--$_Files-->

                <fieldset class="fieldset" id="contact">
                    <legend class="legend">Contact Information</legend>

                    <div class="form-row">
                        <p class="bar-input">
                            <label for="firstnameInp">First Name:</label>
                            <input id="firstnameInp" name="first_name" type="text" required placeholder="Bob">
                        </p>
    
                        <p class="bar-input">
                            <label for="secondnameInp">Surname:</label>
                            <input id="secondnameInp" name="last_name" type="text" required placeholder="Barney">
                        </p>
                    </div>

                    <fieldset class="form-row fake-fieldset">
                        <legend>Gender</legend>

                        <p class="radio-input">
                            <input type="radio" id="maleInp" name="gender" value="male" required>
                            <label for="maleInp">Male</label>
                        </p>

                        <p class="radio-input">
                            <input type="radio" id="femaleInp" name="gender" value="female">
                            <label for="femaleInp">Female</label>
                        </p>

                        <p class="radio-input">
                            <input type="radio" id="noInp" name="gender" value="other">
                            <label for="noInp">Other</label>
                        </p>
                    </fieldset>

                    <p class="bar-input">
                        <label for="emailInp">E-mail:</label>
                        <input id="emailInp" name="client_email" type="email" required autocomplete="email"
                            placeholder="you@example.com">
                    </p>

                    <div class="form-row">
                        <p class="bar-input">
                            <label for="phoneInp">Phone Number:</label>
                            <input id="phoneInp" name="client_phone" type="tel" autocomplete="tel" pattern="[0-9\+\-\s]+"
                                placeholder="+41 79 123 45 67">
                        </p>
    
                        <p class="bar-input">
                            <label for="urlInp">Social Media Link:</label>
                            <input id="urlInp" name="client_url" type="url" placeholder="https://instagram.com/...">
                        </p>
                    </div>
                </fieldset>
                <br>
                <fieldset class="fieldset" id="commission-details">
                    <legend class="legend">Illustration Commission</legend>
                
                    <p class="bar-input">
                        <label for="typeInp">Commission Type:</label>
                        <select id="typeInp" name="commission_type" required>
                            <option value="none">Select</option>
                            <option value="sketch">Sketch</option>
                            <option value="lineart">Lineart</option>
                            <option value="full_color">Full Color</option>
                        </select>
                    </p>
                
                    <p class="bar-input">
                        <label for="charactersInp">Number of Characters:</label>
                        <input id="charactersInp" name="character_count" type="number" min="0" max="8" value="0">
                    </p>
                
                    <p class="bar-input">
                        <label for="dateInp">Desired Deadline:</label>
                        <input id="dateInp" name="deadline" type="date">
                    </p>
                
                    <p class="bar-input">
                        <label for="detailsInp">Additional Artwork Details:</label>
                        <textarea id="detailsInp" name="artwork_details" rows="3"
                            placeholder="Describe your vision, character poses, references, etc."></textarea>
                    </p>
                
                    <p class="bar-input">
                        <label for="fileInp">Reference Images:</label>
                        <input id="fileInp" name="reference_images[]" type="file" accept="image/*" multiple value="none">
                    </p>
                
                    <fieldset class="fake-fieldset">
                        <legend>Add-ons</legend>
                
                        <div class="fake-fieldset-content">
                            <p class="mult-input">
                                <input type="checkbox" id="bgInp" name="addons[]" value="background">
                                <label for="bgInp">Background</label>
                            </p>
                
                            <p class="mult-input">
                                <input type="checkbox" id="commercialInp" name="addons[]" value="commercial">
                                <label for="commercialInp">Commercial Use</label>
                            </p>

                            <p class="mult-input">
                                <input type="checkbox" id="lowPrioInp" name="addons[]" value="slow_delivery">
                                <label for="lowPrioInp">Low Priority</label>
                            </p>
                
                            <p class="mult-input">
                                <input type="checkbox" id="fastInp" name="addons[]" value="fast_delivery" disabled>
                                <label for="fastInp">Quick Delivery</label>
                            </p>
                        </div>
                    </fieldset>
                </fieldset>

                <button class="form-button" type="submit">Send Commission Request</button>
            </form>
        </section>

        <footer class="site-footer">
            <small>&copy; 2026 Montserrat Barco Montemayor - All rights reserved. <strong>All of them.</strong></small>
        </footer>
    </main>
</body>

</html>
