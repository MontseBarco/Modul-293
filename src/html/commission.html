<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission - Montserrat Barco</title>
    <meta name="description" content="The Commision Page to my Portfolio.">

    <link rel="icon" type="image/png" href="/assets/images/painterIconTitle.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/style.css">

    <script src="../javascript/responsive.js" defer></script>
</head>

<body>
    <header>
        <button aria-label="Open menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="commission.html" aria-current="page"><b>Commission</b></a></li>
                <li><a href="about.html">About Me</a></li>
            </ul>
        </nav>

        <a href="https://www.instagram.com/macaroniandcheese_101_" aria-label="Visit my instagram profile."
            target="_blank" rel="noreferrer">
            <i class="fa-brands fa-instagram"></i>
        </a>
    </header>

    <main>
        <header>
            <h1>Art Commissions</h1>
        </header>

        <section>
            <form action="https://gibm.becknet.ch/formular/formular.php" method="POST" enctype="multipart/form-data">

                <fieldset id="contact">
                    <legend>Contact Information</legend>

                    <label for="firstnameInp">First Name:</label>
                    <input id="firstnameInp" name="first_name" type="text" required placeholder="Bob">

                    <label for="secondnameInp">Surname:</label>
                    <input id="secondnameInp" name="last_name" type="text" required placeholder="Barney">

                    <fieldset>
                        <legend>Gender</legend>

                        <input type="radio" id="maleInp" name="gender" value="male" required>
                        <label for="maleInp">Male</label>

                        <input type="radio" id="femaleInp" name="gender" value="female">
                        <label for="femaleInp">Female</label>

                        <input type="radio" id="noInp" name="gender" value="other">
                        <label for="noInp">Other</label>
                    </fieldset>

                    <label for="emailInp">E-mail:</label>
                    <input id="emailInp" name="client_email" type="email" required autocomplete="email"
                        placeholder="you@example.com">

                    <label for="phoneInp">Phone Number:</label>
                    <input id="phoneInp" name="client_phone" type="tel" autocomplete="tel" pattern="[0-9\+\-\s]+"
                        placeholder="+41 79 123 45 67">

                    <label for="urlInp">Social Media Link:</label>
                    <input id="urlInp" name="client_url" type="url" placeholder="https://instagram.com/...">
                </fieldset>

                <fieldset id="commission-details">
                    <legend>Illustration Commission</legend>

                    <label for="typeInp">Commission Type:</label>
                    <select id="typeInp" name="commission_type" required>
                        <option value="">-- Please select --</option>
                        <option value="sketch">Sketch</option>
                        <option value="lineart">Lineart</option>
                        <option value="full_color">Full Color</option>
                    </select>

                    <label for="charactersInp">Number of Characters:</label>
                    <input id="charactersInp" name="character_count" type="number" max="8" value="0">

                    <label for="dateInp">Desired Deadline:</label>
                    <input id="dateInp" name="deadline" type="date">

                    <fieldset>
                        <legend>Add-ons (Multiple Selection)</legend>

                        <input type="checkbox" id="bgInp" name="addons[]" value="background">
                        <label for="bgInp">Background</label>

                        <input type="checkbox" id="commercialInp" name="addons[]" value="commercial">
                        <label for="commercialInp">Commercial Use</label>
                    </fieldset>
                </fieldset>

                <button type="submit">Send Commission Request</button>
            </form>
        </section>

        <footer>
            <small>&copy; 2026 Montserrat Barco Montemayor - All rights reserved. <strong>All of them.</strong></small>
        </footer>
    </main>
</body>

</html>
